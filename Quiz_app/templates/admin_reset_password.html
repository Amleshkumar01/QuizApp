{% extends 'base.html' %}
{% block title %}Reset Password — {{ student.username }} | PlacementIQ{% endblock %}
{% block content %}
<div class="content-wrapper fade-in-up" style="max-width:480px;">
    <h3 class="fw-bold mb-1">Reset Password</h3>
    <p style="color:var(--muted);" class="mb-4">Set a new password for <strong>{{ student.username }}</strong> ({{ student.email|default:"no email" }})</p>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="password" class="form-control" required placeholder="Enter new password">
        </div>
        <button type="submit" class="btn btn-primary">Reset Password</button>
        <a href="{% url 'admin_student_detail' student.id %}" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
</div>
{% endblock %}
