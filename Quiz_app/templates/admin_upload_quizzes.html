{% extends 'base.html' %}
{% block title %}Upload Quizzes CSV | PlacementIQ{% endblock %}
{% block content %}
<div class="content-wrapper" style="max-width: 520px;">
    <h3 class="fw-bold mb-4">Upload Quizzes via CSV</h3>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">CSV file (max 2MB)</label>
            <input type="file" name="csv_file" class="form-control" accept=".csv,text/csv" required>
        </div>
        <button type="submit" class="btn btn-primary">Upload</button>
        <a href="{% url 'admin_manage_quizzes' %}" class="btn btn-outline-secondary ms-2">Back</a>
    </form>
    <p class="text-muted small mt-3 mb-0">Format: <code>title,category,status</code> — status: active, hold, or disabled.</p>
</div>
{% endblock %}
