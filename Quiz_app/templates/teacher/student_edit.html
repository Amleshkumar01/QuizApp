{% extends 'teacher/base_teacher.html' %}
{% block teacher_title %}Edit Student{% endblock %}
{% block teacher_content %}
<div class="page-header">
    <div><h2 class="fw-bold mb-1">Edit Student</h2><p class="mb-0" style="color:var(--muted);">{{ student.username }} — only safe fields can be changed.</p></div>
    <a href="{% url 'teacher_student_detail' student.id %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>
<div class="feature-card">
    <form method="post" novalidate>
        {% csrf_token %}
        {% include 'teacher/_form_fields.html' %}
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Save</button>
    </form>
</div>
{% endblock %}
