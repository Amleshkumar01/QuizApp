{% extends 'base.html' %}
{% block title %}Sign In | PlacementIQ{% endblock %}

{% block content %}
<div class="auth-page fade-in-up">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo primary">
                <i class="bi bi-person-check"></i>
            </div>
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Sign in to your PlacementIQ account</p>

            <form method="post" novalidate>
                {% csrf_token %}
                <div class="auth-input-group">
                    <label for="id_username">Username or Email</label>
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" id="id_username" name="username" required
                           placeholder="Enter your username or email"
                           value="{{ form_username|default:'' }}" autocomplete="username">
                </div>

                <div class="auth-input-group">
                    <label for="id_password">Password</label>
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" id="id_password" name="password" required
                           placeholder="Enter your password"
                           autocomplete="current-password">
                </div>

                <button type="submit" class="btn-signin">Sign In</button>
            </form>

            <div class="auth-link">
                Don't have an account? <a href="{% url 'student_register' %}">Sign up free</a>
            </div>

            <div class="social-proof">
                <p>
                    <span class="avatars">
                        <span class="avatar-dot" style="background:#6366f1;">S</span>
                        <span class="avatar-dot" style="background:#10b981;">A</span>
                        <span class="avatar-dot" style="background:#f59e0b;">R</span>
                    </span>
                    Students are practicing right now
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
