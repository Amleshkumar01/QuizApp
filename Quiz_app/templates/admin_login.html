{% extends 'base.html' %}
{% block title %}Admin Login | PlacementIQ{% endblock %}

{% block content %}
<div class="auth-page fade-in-up">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo red">
                <i class="bi bi-shield-lock"></i>
            </div>
            <h1 class="auth-title">Admin Portal</h1>
            <p class="auth-subtitle">Authorized administrators only</p>

            <form method="post" novalidate>
                {% csrf_token %}
                <div class="auth-input-group">
                    <label for="id_username">Admin Username</label>
                    <i class="bi bi-person-gear input-icon"></i>
                    <input type="text" id="id_username" name="username" required
                           placeholder="Enter admin username" autocomplete="username">
                </div>

                <div class="auth-input-group">
                    <label for="id_password">Password</label>
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" id="id_password" name="password" required
                           placeholder="Enter password" autocomplete="current-password">
                </div>

                <button type="submit" class="btn-admin-signin">Sign In to Admin</button>
            </form>

            <div class="auth-link">
                <a href="{% url 'home' %}"><i class="bi bi-arrow-left me-1"></i>Back to home</a>
                &middot;
                <a href="{% url 'student_login' %}">Student login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
