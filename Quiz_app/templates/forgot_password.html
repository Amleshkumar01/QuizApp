{% extends 'base.html' %}
{% block title %}Reset Password | PlacementIQ{% endblock %}

{% block content %}
<div class="auth-page fade-in-up">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo primary">
                <i class="bi bi-key"></i>
            </div>
            <h1 class="auth-title">Forgot password?</h1>
            <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>

            <form method="post" novalidate>
                {% csrf_token %}
                <div class="auth-input-group">
                    <label for="id_email">Email Address</label>
                    <i class="bi bi-envelope input-icon"></i>
                    <input type="email" id="id_email" name="email" required
                           placeholder="Enter your email"
                           value="{{ form_email|default:'' }}" autocomplete="email">
                </div>

                <button type="submit" class="btn-signin">Send Reset Link</button>
            </form>

            <div class="auth-link" style="margin-top:1.5rem;">
                <a href="{% url 'student_login' %}"><i class="bi bi-arrow-left me-1"></i>Back to sign in</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
